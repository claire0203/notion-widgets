<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* 배경: 요청하신 파스텔 블루 */
            --bg-soft-blue: #f5f8fa;
            
            /* 카드: 애플 스타일의 깔끔한 화이트/회색 상자 */
            --card-bg: rgba(255, 255, 255, 0.9); 
            --card-border: rgba(0, 0, 0, 0.04);
            
            /* 텍스트 및 포인트 컬러 */
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --header-text: #7a92a3;

            /* 카테고리별 포인트 색상 (글자색으로만 사용) */
            --p-blue: #007aff;   /* 공부 */
            --p-orange: #ff9500; /* 아르바이트 */
            --p-green: #34c759;  /* 학교 */
            --p-purple: #5856d6; /* 운동 */
        }

        body {
            margin: 0;
            padding: 8px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-soft-blue);
            overflow: hidden; /* 스크롤 방지 */
            height: 100vh;
            display: flex;
            align-items: flex-start;
        }

        .calendar-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            height: 98vh;
        }

        .day-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
            height: 100%;
        }

        .day-header {
            padding: 10px 0;
            text-align: center;
            font-weight: 700;
            font-size: 11px;
            color: var(--header-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .event-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px 10px;
            border: 1px solid var(--card-border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            min-height: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .time {
            font-size: 9px;
            font-weight: 700;
            margin-bottom: 2px;
            white-space: nowrap;
        }

        /* 과목별 텍스트 색상 포인트 */
        .study .time { color: var(--p-blue); }
        .work .time { color: var(--p-orange); }
        .school .time { color: var(--p-green); }
        .exercise .time { color: var(--p-purple); }

        .title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty-state {
            flex-grow: 1;
            border: 1.5px dashed rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            margin-top: 2px;
        }

        /* 패드 가로모드 최적화 */
        @media (min-width: 1024px) {
            .title { font-size: 11.5px; }
            .time { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="calendar-container" id="week-grid"></div>

<script>
    const scheduleData = {
        "월": [
            { t: "08:30-11:00", n: "📖 국어 인강 수강", type: "study" },
            { t: "11:30-13:00", n: "검도 🤺", type: "exercise" },
            { t: "14:30-18:00", n: "📐 수학 공통 n제", type: "study" },
            { t: "20:00-22:00", n: "📜 세계사 개념", type: "study" }
        ],
        "화": [
            { t: "07:00-08:00", n: "요가 🧘", type: "exercise" },
            { t: "09:00-12:30", n: "📝 국어 실전 실모", type: "study" },
            { t: "14:00-18:00", n: "📐 기하 한완수 독학", type: "study" },
            { t: "20:00-22:30", n: "🔍 기하 n제 풀이", type: "study" }
        ],
        "수": [
            { t: "08:30-11:00", n: "📖 국어 인강 수강", type: "study" },
            { t: "11:30-13:00", n: "검도 🤺", type: "exercise" },
            { t: "14:30-18:00", n: "📐 수학 공통 n제", type: "study" },
            { t: "20:00-22:00", n: "📜 동아시아사 개념", type: "study" }
        ],
        "목": [
            { t: "07:00-08:00", n: "요가 🧘", type: "exercise" },
            { t: "11:00-13:00", n: "학교 🏫", type: "school" },
            { t: "14:00-17:00", n: "📚 수학 공통 n제", type: "study" },
            { t: "18:00-22:00", n: "알바 💼", type: "work" }
        ],
        "금": [
            { t: "08:00-11:00", n: "알바 💼", type: "work" },
            { t: "11:30-13:00", n: "검도 🤺", type: "exercise" },
            { t: "15:00-17:00", n: "수학 단과 수업 🏫", type: "school" },
            { t: "18:00-21:30", n: "✍️ 수학 복습 및 과제", type: "study" }
        ],
        "토": [
            { t: "09:00-09:50", n: "필라테스 🤸", type: "exercise" },
            { t: "11:00-13:00", n: "📖 국어 부족분 보충", type: "study" },
            { t: "14:00-17:00", n: "📐 기하 한완수/n제", type: "study" },
            { t: "18:00-20:00", n: "📜 사탐 주간 복습", type: "study" }
        ],
        "일": []
    };

    const days = ["월", "화", "수", "목", "금", "토", "일"];
    const container = document.getElementById('week-grid');

    days.forEach(day => {
        const column = document.createElement('div');
        column.className = 'day-column';
        let html = `<div class="day-header">${day}</div>`;
        if (scheduleData[day].length > 0) {
            scheduleData[day].forEach(item => {
                html += `
                    <div class="event-card ${item.type}">
                        <div class="time">${item.t}</div>
                        <div class="title">${item.n}</div>
                    </div>
                `;
            });
        }
        html += `<div class="empty-state"></div>`;
        column.innerHTML = html;
        container.appendChild(column);
    });
</script>

</body>
</html>
