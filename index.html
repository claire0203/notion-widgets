<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Style Weekly Schedule</title>
    <style>
        :root {
            --bg-color: #e3f2fd; /* 연한 하늘색 배경 */
            --card-bg: rgba(255, 255, 255, 0.7);
            --accent-blue: #007aff;
            --text-dark: #1d1d1f;
            --text-gray: #6e6e73;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .calendar-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* 7열 가로 배치 */
            gap: 12px;
            height: fit-content;
        }

        .day-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 120px;
        }

        .day-header {
            padding: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            backdrop-filter: blur(10px);
            margin-bottom: 4px;
        }

        /* 오늘 날짜 강조 (선택 사항) */
        .day-header.today {
            background: var(--accent-blue);
            color: white;
        }

        .event-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .event-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        .time-tag {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent-blue);
            letter-spacing: -0.01em;
            text-transform: uppercase;
        }

        .event-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .empty-state {
            height: 100px;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 0, 0, 0.1);
            font-size: 0.8rem;
        }

        /* 노션 모바일 뷰 대응 */
        @media (max-width: 900px) {
            .calendar-container {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                overflow-x: auto;
                padding-bottom: 15px;
            }
        }
    </style>
</head>
<body>

<div class="calendar-container" id="week-grid">
    </div>

<script>
    const schedule = {
        "월": [{ t: "11:30-13:00", n: "검도 🤺" }],
        "화": [{ t: "07:00-08:00", n: "요가 🧘" }, { t: "10:30-11:45", n: "학교 🏫" }],
        "수": [{ t: "11:30-13:00", n: "검도 🤺" }],
        "목": [{ t: "07:00-08:00", n: "요가 🧘" }, { t: "10:30-11:45", n: "학교 🏫" }],
        "금": [{ t: "11:30-13:00", n: "검도 🤺" }],
        "토": [{ t: "09:00-09:50", n: "필라테스 🤸" }],
        "일": []
    };

    const days = ["월", "화", "수", "목", "금", "토", "일"];
    const container = document.getElementById('week-grid');

    // 현재 요일 확인용 (강조 디자인용)
    const todayNum = new Date().getDay(); // 0(일)~6(토)
    const dayMap = [6, 0, 1, 2, 3, 4, 5]; // 일월화수목금토 순서를 월화수목금토일 순서 인덱스로 변경

    days.forEach((day, index) => {
        const column = document.createElement('div');
        column.className = 'day-column';

        // 헤더 생성
        const isToday = dayMap[todayNum] === index;
        const header = `<div class="day-header ${isToday ? 'today' : ''}">${day}</div>`;
        
        // 카드 생성
        let cardsHtml = header;
        if (schedule[day].length > 0) {
            schedule[day].forEach(item => {
                cardsHtml += `
                    <div class="event-card">
                        <div class="time-tag">${item.t}</div>
                        <div class="event-title">${item.n}</div>
                    </div>
                `;
            });
        } else {
            cardsHtml += `<div class="empty-state">No plans</div>`;
        }

        column.innerHTML = cardsHtml;
        container.appendChild(column);
    });
</script>

</body>
</html>
